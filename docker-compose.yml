services:
  postgres:
    image: postgres:16-alpine
    container_name: marketforge-postgres
    environment:
      POSTGRES_USER: marketforge
      POSTGRES_PASSWORD: marketforge_secret
      POSTGRES_DB: marketforge_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketforge -d marketforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketforge-network

  redis:
    image: redis:7-alpine
    container_name: marketforge-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marketforge-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketforge-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://marketforge:marketforge_secret@postgres:5432/marketforge_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - marketforge-network
    volumes:
      - ./app:/app/app:ro

networks:
  marketforge-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
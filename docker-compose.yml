version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketforge-postgres
    environment:
      POSTGRES_USER: marketforge
      POSTGRES_PASSWORD: marketforge_secret
      POSTGRES_DB: marketforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketforge -d marketforge_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: